    .nb{font-size:1.25rem;font-weight:800;color:#e8e8ec}

    .hero{text-align:center;padding:100px 20px 80px;max-width:900px;margin:0 auto;position:relative;z-index:2}
    .hero-wrap{position:relative;overflow:hidden}
    .hero-wrap::before{content:'';position:absolute;inset:0;background:url(/images/hero-bg.webp) center/cover no-repeat;opacity:.15;z-index:0}

    .mg{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:24px}

    .mc .ma:hover{color:#cf7aff}

    .pc .pb{list-style:none;padding:0;margin:0 0 24px;text-align:left}

    .sn{width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,#07f0ff,#cf7aff);color:#000;font-weight:800;font-size:1.2rem;display:flex;align-items:center;justify-content:center;margin:0 auto 20px}

    .ct tr:hover td{background:rgba(7,240,255,.03)}
    .ct td:first-child{font-weight:500;color:#e8e8ec}
    .tg{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:24px}
    .tc{background:#12121a;border:1px solid #252530;border-radius:16px;padding:28px}
    .ts{margin-bottom:12px;color:#fbbf24}
    .tt{color:#8a8a98;font-size:.95rem;line-height:1.6;margin-bottom:16px;font-style:italic}
    .ta{font-weight:600;font-size:.9rem}
    .tl{color:#8a8a98;font-size:.8rem}
    .fq{border-bottom:1px solid #252530;padding:20px 0}
    .fqu{font-size:1.1rem;font-weight:600;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
    .fqu:hover{color:#07f0ff}
    .fan{max-height:0;overflow:hidden;transition:max-height .3s ease;padding-right:40px}
    .fan.o{max-height:500px;padding-top:12px}
    .fan p{color:#8a8a98;margin:0;line-height:1.7}
    .ft{color:#07f0ff;font-size:1.4rem;transition:transform .3s}
    .ft.o{transform:rotate(45deg)}
    .fcta{text-align:center;padding:100px 20px;background:linear-gradient(180deg,#0a0a0f 0%,#12121a 100%);border-top:1px solid #252530}
    .fcta h2{font-size:2.2rem;font-weight:800;margin-bottom:16px}
    .fcta p{color:#8a8a98;font-size:1.1rem;max-width:600px;margin:0 auto 32px}
    .fcta .gu{color:#8a8a98;font-size:.85rem;margin-top:20px}
    footer{background:#12121a;border-top:1px solid #252530;padding:60px 20px 30px}
    .fi2{max-width:1200px;margin:0 auto;display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:40px}
    .fb{font-size:1.2rem;font-weight:800;margin-bottom:12px}
    .fd{color:#8a8a98;font-size:.9rem;line-height:1.6;margin-bottom:16px}
    .fcol h4{font-size:.9rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:#8a8a98;margin-bottom:16px}
    .fcol a{display:block;color:#8a8a98;font-size:.9rem;margin-bottom:10px}
    .fcol a:hover{color:#07f0ff}
    .fb2{max-width:1200px;margin:40px auto 0;padding-top:24px;border-top:1px solid #252530;text-align:center;color:#8a8a98;font-size:.8rem;line-height:1.6}
    @media(max-width:768px){
      .hero h1{font-size:2.2rem}.st{font-size:1.8rem}.nl{display:none}
      .fi2{grid-template-columns:1fr;text-align:center}
      .ct{font-size:.75rem}.ct th,.ct td{padding:8px}
      .rev{padding:24px}
    }
  </style>

<body>
  <nav>
    <div class="ni">
      <a href="/" class="nb" data-i18n="nav.brand"></a>
      <div class="nl">
        <a href="#features" data-i18n="nav.links.0"></a>
        <a href="#how-it-works" data-i18n="nav.links.1"></a>
        <a href="#review" data-i18n="nav.links.2"></a>
        <a href="#faq" data-i18n="nav.links.3"></a>
        <a href="/go/lovescape" class="btn" style="padding:10px 20px;font-size:.85rem" rel="nofollow sponsored" data-i18n="nav.cta"></a>
      </div>

  </nav>

  <div class="hero-wrap">
  <section class="hero">
    <span class="hb" data-i18n="hero.badge"></span>
    <h1 data-i18n="hero.title"></h1>
    <p data-i18n="hero.subtitle"></p>
    <div class="hb2">
      <a href="/go/lovescape" class="btn" rel="nofollow sponsored" data-i18n="hero.cta_primary"></a>
      <a href="#review" class="btn-o" data-i18n="hero.cta_secondary"></a>
    </div>
    <div class="hp">
      <span data-i18n="hero.stats.0"></span>
      <span data-i18n="hero.stats.1"></span>
      <span data-i18n="hero.stats.2"></span>
    </div>
    <div class="rb">
      <span class="rs">★★★★★</span>
      <span class="rt" data-i18n="hero.rating"></span>
    </div>
  </section>
  </div>

  <section class="s" id="models">
    <h2 class="st g" data-i18n="models.title"></h2>
    <p class="ss" data-i18n="models.subtitle"></p>
    <div class="mg" id="models-grid"></div>
  </section>

  <section class="s" id="pricing">
    <h2 class="st g" data-i18n="pricing.title"></h2>
    <p class="ss" data-i18n="pricing.subtitle"></p>
    <div class="pg" id="pricing-grid"></div>
  </section>

  <section class="s" id="features">
    <h2 class="st g" data-i18n="features.title"></h2>
    <p class="ss" data-i18n="features.subtitle"></p>
    <div class="fg" id="features-grid"></div>
  </section>

  <section class="s" id="how-it-works">
    <h2 class="st g" data-i18n="how_it_works.title"></h2>
    <p class="ss" data-i18n="how_it_works.subtitle"></p>
    <div class="steps" id="steps-grid"></div>
  </section>

  <section class="s" id="review">
    <h2 class="st g" data-i18n="review.title"></h2>
    <p class="ss" data-i18n="review.subtitle"></p>
    <div id="review-sections"></div>
  </section>

  <section class="s" id="comparison">
    <h2 class="st g" data-i18n="comparison.title"></h2>
    <p class="ss" data-i18n="comparison.subtitle"></p>
    <div style="overflow-x:auto">
      <table class="ct" id="comparison-table"></table>
    </div>
  </section>

  <section class="s" id="testimonials">
    <h2 class="st g" data-i18n="testimonials.title"></h2>
    <p class="ss" data-i18n="testimonials.subtitle"></p>
    <div class="tg" id="testimonials-grid"></div>
  </section>

  <section class="s" id="faq">
    <h2 class="st g" data-i18n="faq.title"></h2>
    <p class="ss" data-i18n="faq.subtitle"></p>
    <div id="faq-items"></div>
  </section>

  <section class="fcta">
    <h2 data-i18n="cta.title"></h2>
    <p data-i18n="cta.subtitle"></p>
    <a href="/go/lovescape" class="btn" rel="nofollow sponsored" data-i18n="cta.button"></a>
    <p class="gu" data-i18n="cta.guarantee"></p>
  </section>

  <footer>
    <div class="fi2">
      <div><div class="fb" data-i18n="footer.brand"></div><p class="fd" data-i18n="footer.description"></p></div>
      <div class="fcol"><h4 data-i18n="footer.columns.0.title"></h4><div id="footer-col-0"></div></div>
      <div class="fcol"><h4 data-i18n="footer.columns.1.title"></h4><div id="footer-col-1"></div></div>
      <div class="fcol"><h4 data-i18n="footer.columns.2.title"></h4><div id="footer-col-2"></div></div>
    </div>
    <div class="fb2">
      <p data-i18n="footer.copyright"></p>
      <p data-i18n="footer.disclaimer"></p>
      <p data-i18n="footer.trademark"></p>
    </div>
  </footer>

  <script>
    fetch('/content.json')
      .then(r => r.json())
      .then(c => {
        document.querySelectorAll('[data-i18n]').forEach(el => {
          const key = el.getAttribute('data-i18n');
          const val = key.split('.').reduce((o,k) => o?.[k], c);
          if (val) el.textContent = val;
        });

        const mg = document.getElementById('models-grid');
        c.models.items.forEach(m => {
          const slug = m.name.toLowerCase().replace(/[^a-z0-9]/g,'-').replace(/--+/g,'-').replace(/^-|-$/g,'');
          mg.innerHTML += '<div class="mc"><img src="/images/models/'+slug+'.webp" alt="'+m.name+'" loading="lazy"><div class="mi"><div class="mn">'+m.name+'</div><div class="mt">'+m.stats+'</div><div class="md">'+m.description+'</div><a href="/go/lovescape" class="ma" rel="nofollow sponsored">'+m.cta+'</a></div></div>';
        });

        const pg = document.getElementById('pricing-grid');
        c.pricing.plans.forEach(p => {
          const pop = p.popular ? ' pop' : '';
          const tag = p.tag ? '<div class="ptag">'+p.tag+'</div>' : '';
          const feats = p.features.map(f => '<li class="'+(f.included?'in':'out')+'">'+f.text+'</li>').join('');
          const btnClass = p.popular ? 'btn' : 'btn-o';
          pg.innerHTML += '<div class="pc'+pop+'">'+tag+'<div class="pd">'+p.duration+'</div><div class="pm">'+p.price+'<span>'+p.period+'</span></div><div class="po">'+p.daily+'</div><ul class="pb">'+feats+'</ul><a href="/go/lovescape" class="'+btnClass+'" style="width:100%;text-align:center" rel="nofollow sponsored">'+p.cta+'</a></div>';
        });

        const fg = document.getElementById('features-grid');
        c.features.items.forEach(f => {
          fg.innerHTML += '<div class="card fc"><div class="fi">'+f.icon+'</div><h3>'+f.title+'</h3><p>'+f.description+'</p></div>';
        });

        const sg = document.getElementById('steps-grid');
        c.how_it_works.steps.forEach(s => {
          sg.innerHTML += '<div class="step"><div class="sn">'+s.number+'</div><h3>'+s.title+'</h3><p>'+s.description+'</p></div>';
        });

        const rs = document.getElementById('review-sections');
        c.review.sections.forEach(r => {
          if (r.heading === 'Pros and Cons') {
            rs.innerHTML += '<div class="rev"><h2>'+r.heading+'</h2><p><strong>Pros:</strong> '+r.pros+'</p><p><strong>Cons:</strong> '+r.cons+'</p></div>';
          } else if (r.heading === 'Final Verdict') {
            const content = Array.isArray(r.content) ? r.content.map(p => '<p>'+p+'</p>').join('') : '<p>'+r.content+'</p>';
            rs.innerHTML += '<div class="rev"><h2>'+r.heading+'</h2>'+content+'</div>';
          } else {
            rs.innerHTML += '<div class="rev"><h2>'+r.heading+'</h2><p>'+r.content+'</p></div>';
          }
        });

        const ct = document.getElementById('comparison-table');
        let th = c.comparison.headers.map(h => '<th>'+h+'</th>').join('');
        let tr = c.comparison.rows.map(r => '<tr>'+r.map(c => '<td>'+c+'</td>').join('')+'</tr>').join('');
        ct.innerHTML = '<tr>'+th+'</tr>'+tr;

        const tg = document.getElementById('testimonials-grid');
        c.testimonials.items.forEach(t => {
          const stars = '★'.repeat(t.rating) + '☆'.repeat(5-t.rating);
          tg.innerHTML += '<div class="tc"><div class="ts">'+stars+'</div><p class="tt">"'+t.text+'"</p><div class="ta">'+t.author+'</div><div class="tl">'+t.location+'</div></div>';
        });

        const fq = document.getElementById('faq-items');
        c.faq.items.forEach((q,i) => {
          fq.innerHTML += '<div class="fq"><div class="fqu" onclick="t('+i+')">'+q.question+'<span class="ft" id="ft'+i+'">+</span></div><div class="fan" id="fa'+i+'"><p>'+q.answer+'</p></div></div>';
        });

        c.footer.columns.forEach((col,i) => {
          const el = document.getElementById('footer-col-' + i);
          col.links.forEach((l, j) => {
            let href = '#';
            if (i === 0) {
              const anchors = ['#features', '#how-it-works', '#review', '#faq'];
              href = anchors[j] || '#';
            } else if (i === 1) {
              const pages = ['/privacy.html', '/terms.html', '/affiliate-disclosure.html'];
              href = pages[j] || '#';
            }
            el.innerHTML += '<a href="'+href+'"' + (href.startsWith('/') ? '' : '') + '>'+l+'</a>';
          });
        });
      });

    function t(i){var a=document.getElementById('fa'+i);var b=document.getElementById('ft'+i);a.classList.toggle('o');b.classList.toggle('o');}
  </script>
</body>
